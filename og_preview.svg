<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">JavaPrep Elite OG Preview</title>
  <desc id="desc">초보 개발자를 위한 Java 코딩 테스트 6주 정복 플래너 소셜 미리보기 이미지</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a52"/>
      <stop offset="45%" stop-color="#00236f"/>
      <stop offset="100%" stop-color="#00143f"/>
    </linearGradient>

    <linearGradient id="goldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="52%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <linearGradient id="panelGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <linearGradient id="softGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.18"/>
    </linearGradient>




    <style>
      .font-ui {
        font-family: Pretendard, Inter, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      }
      .font-code {
        font-family: Inter, Pretendard, "Noto Sans KR", system-ui, sans-serif;
      }
      .brand {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 0.08em;
        fill: #fbbf24;
      }
      .headline-white {
        font-weight: 800;
        letter-spacing: -0.045em;
        fill: #ffffff;
        filter: url(#textGlow);
      }
      .headline-gold {
        font-weight: 900;
        letter-spacing: -0.045em;
        fill: #fbbf24;
        filter: url(#textGlow);
      }
      .support {
        font-size: 25px;
        font-weight: 600;
        fill: #ffffff;
      }
      .description {
        font-size: 20px;
        font-weight: 400;
        letter-spacing: -0.02em;
        fill: #cbd5e1;
      }
      .muted-line { fill: #cbd5e1; }
      .strong-line { fill: #64748b; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#eef2f7"/>
  <rect x="0" y="0" width="1200" height="630" rx="28" fill="url(#bgGradient)"/>

  <!-- subtle texture dots -->
  <g opacity="0.10" fill="#ffffff">
    <circle cx="86" cy="74" r="1.2"/><circle cx="126" cy="74" r="1.2"/><circle cx="166" cy="74" r="1.2"/>
    <circle cx="86" cy="114" r="1.2"/><circle cx="126" cy="114" r="1.2"/><circle cx="166" cy="114" r="1.2"/>
    <circle cx="86" cy="154" r="1.2"/><circle cx="126" cy="154" r="1.2"/><circle cx="166" cy="154" r="1.2"/>
  </g>

  <!-- decorative shapes -->
  <circle cx="1048" cy="148" r="139" fill="#ffffff" opacity="0.075"/>
  <circle cx="1048" cy="148" r="139" fill="none" stroke="#fbbf24" stroke-width="1.2" opacity="0.25"/>
  <circle cx="140" cy="575" r="127" fill="#fbbf24" opacity="0.055"/>
  <g opacity="0.12" fill="none" stroke="#fbbf24" stroke-width="1">
    <circle cx="-15" cy="628" r="93"/>
    <circle cx="-15" cy="628" r="113"/>
    <circle cx="-15" cy="628" r="133"/>
    <circle cx="-15" cy="628" r="153"/>
  </g>

  <!-- branding -->
  <g transform="translate(66 62)">
    <rect x="0" y="10" width="72" height="72" rx="11" fill="#000814" opacity="0.18"/>
    <rect width="72" height="72" rx="11" fill="url(#goldGradient)"/>
    <rect x="33" y="18" width="8" height="36" rx="4" fill="#ffffff"/>
    <rect x="18" y="33" width="36" height="8" rx="4" fill="#ffffff"/>
  </g>
  <text x="158" y="105" class="font-code brand">JAVAPREP ELITE</text>

  <!-- headline -->
  <text x="66" y="222" class="font-ui headline-white" font-size="56">초보 개발자를 위한</text>
  <text x="66" y="322" class="font-ui headline-white" font-size="65">Java 코딩 테스트</text>
  <text x="66" y="410" class="font-ui headline-gold" font-size="62">6주 정복 플래너</text>
  <rect x="67" y="438" width="100" height="3" rx="1.5" fill="#fbbf24" opacity="0.92"/>

  <!-- subtitle -->
  <text x="66" y="482" class="font-ui support">Dashboard <tspan fill="#fbbf24">·</tspan> Roadmap <tspan fill="#fbbf24">·</tspan> Problem Log <tspan fill="#fbbf24">·</tspan> Snippets</text>
  <text x="66" y="528" class="font-ui description">JavaPrep Elite는 학습 진도, 문제 기록, 핵심 개념을</text>
  <text x="66" y="561" class="font-ui description">한 화면에서 관리합니다.</text>

  <!-- right dashboard panel -->
  <g transform="translate(738 112)">
    <rect x="0" y="22" width="382" height="446" rx="18" fill="#000814" opacity="0.22"/>
    <rect x="0" y="0" width="382" height="446" rx="18" fill="url(#panelGradient)"/>
    <rect x="0" y="0" width="382" height="446" rx="18" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.75"/>

    <!-- top pills -->
    <rect x="34" y="32" width="67" height="16" rx="5" fill="#e2e8f0" opacity="0.75"/>
    <rect x="34" y="73" width="218" height="12" rx="4" fill="#94a3b8"/>
    <rect x="34" y="98" width="148" height="10" rx="4" fill="#d8dadc"/>

    <!-- banner -->
    <rect x="34" y="132" width="314" height="89" rx="7" fill="url(#softGold)"/>

    <!-- navy card -->
    <g transform="translate(34 247)">
      <rect width="154" height="155" rx="7" fill="#00236f"/>
      <circle cx="77" cy="78" r="60" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
      <circle cx="77" cy="78" r="45" fill="url(#goldGradient)"/>
      <rect x="73" y="49" width="8" height="58" rx="4" fill="#ffffff"/>
      <rect x="48" y="74" width="58" height="8" rx="4" fill="#ffffff"/>
    </g>

    <!-- small cards -->
    <g transform="translate(208 247)">
      <rect x="0" y="6" width="140" height="75" rx="7" fill="#00143f" opacity="0.10"/>
      <rect x="0" y="6" width="140" height="75" rx="7" fill="#00143f" opacity="0.10"/>
      <rect width="140" height="75" rx="7" fill="#ffffff"/>
      <rect x="22" y="23" width="73" height="10" rx="3" fill="#64748b"/>
      <rect x="22" y="46" width="104" height="9" rx="3" fill="#d8dadc"/>
    </g>
    <g transform="translate(208 346)">
      <rect x="0" y="6" width="140" height="75" rx="7" fill="#00143f" opacity="0.10"/>
      <rect x="0" y="6" width="140" height="75" rx="7" fill="#00143f" opacity="0.10"/>
      <rect width="140" height="75" rx="7" fill="#ffffff"/>
      <rect x="22" y="23" width="73" height="10" rx="3" fill="#64748b"/>
      <rect x="22" y="46" width="104" height="9" rx="3" fill="#d8dadc"/>
    </g>
  </g>

  <!-- faint connecting line -->
  <path d="M650 506 C690 460 706 417 728 374" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.08"/>
</svg>
